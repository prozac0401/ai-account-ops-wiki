name: Deploy Wiki Page

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/ai-account-ops-wiki-pages
          cp -R dist/. /tmp/ai-account-ops-wiki-pages/
          git switch --orphan gh-pages
          git rm -rf .
          cp -R /tmp/ai-account-ops-wiki-pages/. .
          touch .nojekyll
          git add .
          git commit -m "Deploy GitHub Pages"
          git push --force origin gh-pages
